name: Trade price
description: Log what an item is buying/selling for between players, to build its 7-day trade value.
title: "Price: "
labels: ["trade"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping price the market! One item per submission. You can fill this from your phone."
  - type: input
    id: item
    attributes:
      label: Item
      description: The exact item name as it appears in-game / on MnMdb.
      placeholder: Rusty Sword
    validations:
      required: true
  - type: input
    id: price
    attributes:
      label: Price
      description: How much it went for. Use coin shorthand, e.g. "5p 3g 20s" or "50g".
      placeholder: 5p 3g
    validations:
      required: true
  - type: dropdown
    id: side
    attributes:
      label: Side
      description: Was this a seller's asking price (WTS) or a buyer's offer (WTB)?
      options:
        - selling (WTS)
        - buying (WTB)
    validations:
      required: true
  - type: input
    id: when
    attributes:
      label: When seen
      description: Optional — a date, or just "today".
      placeholder: today
  - type: input
    id: who
    attributes:
      label: Seller / source
      description: Optional — who was selling, or where you saw it (auction, a trade, etc.).

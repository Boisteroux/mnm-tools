<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MnMdb — Monsters &amp; Memories Economy Database</title>
  <meta name="description" content="Free community economy database for the MMO Monsters &amp; Memories — drop rates, vendor &amp; player-trade prices, crafting recipes, harvest yields, mob values by level, and zone maps. Gathered from players' game logs. No install needed." />
  <link rel="canonical" href="https://mnm-db.com/" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <!-- Open Graph / Twitter — link previews on Discord, Reddit, X, etc. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="MnMdb" />
  <meta property="og:title" content="Monsters &amp; Memories Economy Database" />
  <meta property="og:description" content="Drop rates, vendor &amp; player-trade prices, crafting recipes, harvest yields and zone maps for Monsters &amp; Memories — gathered from players' game logs. Free, no install." />
  <meta property="og:url" content="https://mnm-db.com/" />
  <meta property="og:image" content="https://mnm-db.com/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Monsters &amp; Memories Economy Database" />
  <meta name="twitter:description" content="Drop rates, prices, recipes, harvest yields and maps for Monsters &amp; Memories. Free, no install." />
  <meta name="twitter:image" content="https://mnm-db.com/og-image.png" />
  <!-- Apply the saved theme before CSS loads to avoid a flash of the wrong mode. -->
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||'light';}catch(e){document.documentElement.dataset.theme='light';}</script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" />
  <!-- Cache-bust the stylesheet so edits show without a hard refresh (written
       synchronously in <head> to avoid a flash of unstyled content). -->
  <script>document.write('<link rel="stylesheet" href="styles.css?v=' + Date.now() + '">');</script>
  <noscript><link rel="stylesheet" href="styles.css" /></noscript>
</head>
<body>
  <header>
    <a class="brand" href="#/">
      <span class="logo">MnMdb</span>
    </a>
    <nav class="topnav">
      <a href="#/items">Items</a>
      <a href="#/mobs">Mobs</a>
      <a href="#/bestiary">Bestiary</a>
      <a href="#/gathering">Gathering</a>
      <a href="#/tradeskills">Tradeskills</a>
      <a href="#/maps">Maps</a>
      <a href="#/quests">Quest Board</a>
    </nav>
    <div class="header-right">
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search items, mobs, resources…" autocomplete="off" />
      </div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Switch theme">☾</button>
    </div>
  </header>

  <main id="content">
    <p class="loading">Loading data…</p>
  </main>

  <footer>
    <span id="data-meta"></span>
    <span>
      Fan-made &amp; unofficial · community drop &amp; vendor data ·
      <a href="#" class="feedback-link">Give feedback</a> ·
      <a href="https://github.com/Boisteroux/mnm-tools" target="_blank" rel="noopener">mnm-tools</a>
    </span>
  </footer>

  <script>
  (function () {
    var r = document.documentElement, b = document.getElementById('theme-toggle');
    if (!b) return;
    function paint() { var d = r.dataset.theme === 'dark'; b.textContent = d ? '☀' : '☾'; b.setAttribute('aria-label', d ? 'Switch to light theme' : 'Switch to dark theme'); }
    paint();
    b.addEventListener('click', function () {
      r.dataset.theme = r.dataset.theme === 'dark' ? 'light' : 'dark';
      try { localStorage.setItem('theme', r.dataset.theme); } catch (e) {}
      paint();
    });
  })();
  </script>
  <script>(function () { var s = document.createElement('script'); s.src = 'app.js?v=' + Date.now(); document.body.appendChild(s); })();</script>
</body>
</html>

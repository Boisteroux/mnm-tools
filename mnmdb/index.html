<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MnMdb — Monsters &amp; Memories Database</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" />
  <!-- Cache-bust the stylesheet so edits show without a hard refresh (written
       synchronously in <head> to avoid a flash of unstyled content). -->
  <script>document.write('<link rel="stylesheet" href="styles.css?v=' + Date.now() + '">');</script>
  <noscript><link rel="stylesheet" href="styles.css" /></noscript>
</head>
<body>
  <header>
    <a class="brand" href="#/">
      <span class="logo">MnMdb</span>
    </a>
    <nav class="topnav">
      <a href="#/items">Items</a>
      <a href="#/mobs">Mobs</a>
      <a href="#/bestiary">Bestiary</a>
      <a href="#/gathering">Gathering</a>
      <a href="#/tradeskills">Tradeskills</a>
      <a href="#/vendors">Vendors</a>
      <a href="#/maps">Maps</a>
    </nav>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search items, mobs, resources…" autocomplete="off" />
    </div>
  </header>

  <main id="content">
    <p class="loading">Loading data…</p>
  </main>

  <footer>
    <span id="data-meta"></span>
    <span>
      Fan-made &amp; unofficial · community drop &amp; vendor data ·
      <a href="#" class="feedback-link">Give feedback</a> ·
      <a href="https://github.com/Boisteroux/mnm-tools" target="_blank" rel="noopener">mnm-tools</a>
    </span>
  </footer>

  <script>(function () { var s = document.createElement('script'); s.src = 'app.js?v=' + Date.now(); document.body.appendChild(s); })();</script>
</body>
</html>
